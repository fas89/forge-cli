# Build profiles - what goes in each release
# These control which features are included in builds

build_profiles:
  stable:
    description: "Production release - stable features only"
    include_status: [stable]
    target_audience: "Production users, enterprises"
    quality_requirements:
      min_test_coverage: 90
      docs_required: true
      security_scan: true
    
  beta:
    description: "Public beta - stable + beta features for testing"
    include_status: [stable, beta]
    target_audience: "Early adopters, beta testers"
    quality_requirements:
      min_test_coverage: 30
      docs_required: false  # Docs can be incomplete in beta
      security_scan: true
    
  alpha:
    description: "Development build - all features for internal testing"
    include_status: [stable, beta, alpha]
    target_audience: "Developers, internal team"
    quality_requirements:
      min_test_coverage: 10
      docs_required: false
      security_scan: false

