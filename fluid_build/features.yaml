# FLUID Build Feature Maturity Tracking
# 
# AUTO-UPDATED FIELDS (from CI/CD test results):
#   - code_size: Actual lines of code
#   - last_tested: Timestamp of last test run
#   - tests: Pass/fail counts (overall, not per-provider)
#
# MANUAL FIELDS (you control - update when ready to promote):
#   - status: alpha/beta/stable (promotion decision)
#   - test_coverage: % of provider code with tests (MANUAL - see note below)
#   - blockers: What's blocking promotion
#   - note: Human-readable description
#
# NOTE ON COVERAGE:
#   test_coverage is MANUAL because pytest --cov measures "code executed by all tests"
#   not "provider test quality". Adding 200 CLI tests makes provider coverage DROP
#   even though provider tests didn't change. So we keep coverage manual.
#   Update it when you add/remove provider-specific tests.
#
# Promotion Guidelines:
#   - alpha → beta: ≥30% coverage, 0 test failures
#   - beta → stable: ≥80% coverage, 0 test failures, docs complete

metadata:
  version: "1.0"
  current_release: "0.8.0"
