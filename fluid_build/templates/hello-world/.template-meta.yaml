estimated_file_size: "3KB"
description: |
  The simplest possible FLUID contract. Perfect for absolute beginners.
  Creates a single output with a "Hello, FLUID!" message using pure SQL.
  
  This template teaches:
  - Contract anatomy (metadata, outputs, transformations)
  - Local execution workflow
  - Validation and testing
  
  No external data files needed - just pure SQL!
