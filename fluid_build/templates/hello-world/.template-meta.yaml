name: "Hello FLUID"
id: "hello-world"
version: "0.7.1"
difficulty: "beginner"
time_to_complete: "2 minutes"
learning_path_order: 1
track: "foundation"
concepts:
  - "Basic contract structure"
  - "Local execution with DuckDB"
  - "Contract validation"
  - "Simple SQL transformations"
prerequisites:
  - "FLUID CLI installed (pip install fluid-forge)"
  - "Basic understanding of SQL"
quickstart_tutorial: "001-hello-fluid.md"
related_tutorials:
  - "002-csv-to-data-product.md"
  - "003-multi-source-joins.md"
