fluidVersion: "0.7.1"
kind: "DataProduct"
id: "modular.sales_analytics_v1"
name: "Sales Analytics - Modular SQL"
description: "Sales analytics demonstrating modular SQL patterns"
domain: "Sales"
tags:
  - "sales"
  - "modular-sql"
  - "best-practices"

metadata:
  owner:
    team: "sales-analytics"
    email: "sales-analytics@company.com"

consumes:
  - consumeId: "raw_sales"
    title: "Raw Sales Data"
    version: "1.0.0"
    kind: "file"
    purpose: "Raw sales transactions"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/sales.csv"
    
    contract:
      schema:
        - name: "sale_id"
          type: "INTEGER"
          required: true
        - name: "product_id"
          type: "INTEGER"
        - name: "customer_id"
          type: "INTEGER"
        - name: "sale_date"
          type: "DATE"
        - name: "quantity"
          type: "INTEGER"
        - name: "unit_price"
          type: "DECIMAL"
        - name: "discount_pct"
          type: "INTEGER"

exposes:
  - exposeId: "sales_with_revenue"
    title: "Sales with Revenue Calculations"
    version: "1.0.0"
    kind: "table"
    description: "Sales data enriched with revenue calculations"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/sales_with_revenue.parquet"
    
    contract:
      schema:
        - name: "sale_id"
          type: "INTEGER"
          required: true
        - name: "product_id"
          type: "INTEGER"
        - name: "customer_id"
          type: "INTEGER"
        - name: "sale_date"
          type: "DATE"
        - name: "quantity"
          type: "INTEGER"
        - name: "unit_price"
          type: "DECIMAL"
        - name: "discount_pct"
          type: "INTEGER"
        - name: "gross_revenue"
          type: "DECIMAL"
        - name: "discount_amount"
          type: "DECIMAL"
        - name: "net_revenue"
          type: "DECIMAL"
      
      dq:
        rules:
          - id: "positive_revenue"
            type: "accuracy"
            selector: "net_revenue"
            severity: "error"
            description: "Net revenue must be non-negative"
            threshold: 0
            operator: ">="
  
  - exposeId: "daily_sales_summary"
    title: "Daily Sales Summary"
    version: "1.0.0"
    kind: "table"
    description: "Aggregated daily sales metrics"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/daily_sales_summary.parquet"
    
    contract:
      schema:
        - name: "sale_date"
          type: "DATE"
          required: true
        - name: "total_transactions"
          type: "INTEGER"
        - name: "unique_customers"
          type: "INTEGER"
        - name: "total_units_sold"
          type: "INTEGER"
        - name: "total_gross_revenue"
          type: "DECIMAL"
        - name: "total_discounts"
          type: "DECIMAL"
        - name: "total_net_revenue"
          type: "DECIMAL"
        - name: "avg_transaction_value"
          type: "DECIMAL"

builds:
  - id: "sales_analytics_pipeline"
    description: "Calculate revenue and daily summaries"
    pattern: "multi-stage"
    engine: "sql"
    
    properties:
      stages:
        - id: "calculate_revenue"
          description: "Calculate gross, discount, and net revenue"
          logic: |
            SELECT 
              sale_id,
              product_id,
              customer_id,
              sale_date,
              quantity,
              unit_price,
              discount_pct,
              ROUND(quantity * unit_price, 2) as gross_revenue,
              ROUND((quantity * unit_price * discount_pct) / 100.0, 2) as discount_amount,
              ROUND(quantity * unit_price * (1 - discount_pct / 100.0), 2) as net_revenue
            FROM read_csv_auto('data/sales.csv', header=true)
          outputs:
            - "sales_with_revenue"
        
        - id: "daily_summary"
          description: "Aggregate daily sales metrics"
          dependsOn:
            - "calculate_revenue"
          logic: |
            SELECT 
              sale_date,
              COUNT(*) as total_transactions,
              COUNT(DISTINCT customer_id) as unique_customers,
              SUM(quantity) as total_units_sold,
              ROUND(SUM(gross_revenue), 2) as total_gross_revenue,
              ROUND(SUM(discount_amount), 2) as total_discounts,
              ROUND(SUM(net_revenue), 2) as total_net_revenue,
              ROUND(AVG(net_revenue), 2) as avg_transaction_value
            FROM sales_with_revenue
            GROUP BY sale_date
            ORDER BY sale_date DESC
          outputs:
            - "daily_sales_summary"
    
    execution:
      trigger:
        type: "manual"
      runtime:
        platform: "local"
