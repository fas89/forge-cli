fluidVersion: "0.7.2"
kind: "DataProduct"
id: "testing.testable_orders_v1"
name: "Testable Orders"
description: "Example contract with comprehensive data quality tests"
domain: "Testing"
tags:
  - "testing"
  - "validation"
  - "tutorial"

metadata:
  owner:
    team: "data-engineering"
    email: "data-eng@company.com"

consumes:
  - consumeId: "raw_orders"
    title: "Raw Order Data"
    version: "1.0.0"
    kind: "file"
    purpose: "Raw order transactions"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/orders.csv"
    
    contract:
      schema:
        - name: "order_id"
          type: "INTEGER"
          required: true
        - name: "customer_id"
          type: "INTEGER"
        - name: "amount"
          type: "DECIMAL"
        - name: "status"
          type: "VARCHAR"

exposes:
  - exposeId: "order_revenue"
    title: "Order Revenue"
    version: "1.0.0"
    kind: "table"
    description: "Completed orders with positive revenue"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/order_revenue.parquet"
    
    contract:
      schema:
        - name: "order_id"
          type: "INTEGER"
          required: true
        - name: "customer_id"
          type: "INTEGER"
        - name: "revenue"
          type: "DECIMAL"
          required: true
      
      dq:
        rules:
          - id: "positive_revenue"
            type: "accuracy"
            selector: "revenue"
            severity: "error"
            description: "Revenue must be positive"
            threshold: 0
            operator: ">"
          - id: "no_null_revenue"
            type: "completeness"
            selector: "revenue"
            severity: "error"
            description: "Revenue cannot be null"
            threshold: 1.0
            operator: ">="

builds:
  - id: "filter_completed_orders"
    description: "Extract completed orders with positive revenue"
    pattern: "single-stage"
    engine: "sql"
    
    properties:
      logic: |
        SELECT 
          order_id,
          customer_id,
          amount as revenue
        FROM read_csv_auto('data/orders.csv', header=true)
        WHERE status = 'completed'
          AND amount > 0
      outputs:
        - "order_revenue"
    
    execution:
      trigger:
        type: "manual"
      runtime:
        platform: "local"
