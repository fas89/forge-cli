fluidVersion: "0.7.1"
kind: "DataProduct"
id: "tutorial.sales_analytics_pipeline_v1"
name: "Sales Analytics Pipeline"
description: "Sales analytics pipeline with auto-generated Airflow DAG"
domain: "Tutorial"
tags:
  - "sales"
  - "analytics"
  - "airflow"
  - "tutorial"

metadata:
  owner:
    team: "analytics-team"
    email: "analytics-team@company.com"
  orchestration:
    enabled: true
    schedule: "0 2 * * *"
    startDate: "2024-01-01"
    catchup: false
    maxActiveRuns: 1
    tags:
      - "sales"
      - "analytics"
      - "auto-generated"

consumes:
  - consumeId: "raw_customers"
    title: "Customer Master Data"
    version: "1.0.0"
    kind: "file"
    purpose: "Customer master data"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/customers.csv"
    
    contract:
      schema:
        - name: "customer_id"
          type: "INTEGER"
          required: true
        - name: "name"
          type: "VARCHAR"
        - name: "email"
          type: "VARCHAR"
        - name: "signup_date"
          type: "DATE"
        - name: "country"
          type: "VARCHAR"
        - name: "total_spent"
          type: "DECIMAL"
  
  - consumeId: "raw_orders"
    title: "Order Transaction Data"
    version: "1.0.0"
    kind: "file"
    purpose: "Order transaction data"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/orders.csv"
    
    contract:
      schema:
        - name: "order_id"
          type: "INTEGER"
          required: true
        - name: "customer_id"
          type: "INTEGER"
          required: true
        - name: "order_date"
          type: "DATE"
        - name: "product_category"
          type: "VARCHAR"
        - name: "quantity"
          type: "INTEGER"
        - name: "amount"
          type: "DECIMAL"

exposes:
  - exposeId: "customers_cleaned"
    title: "Cleaned Customer Data"
    version: "1.0.0"
    kind: "table"
    description: "Cleaned customer data"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/customers_cleaned.parquet"
    
    contract:
      schema:
        - name: "customer_id"
          type: "INTEGER"
          required: true
        - name: "name"
          type: "VARCHAR"
        - name: "email"
          type: "VARCHAR"
        - name: "signup_date"
          type: "DATE"
        - name: "country"
          type: "VARCHAR"
  
  - exposeId: "orders_cleaned"
    title: "Cleaned Order Data"
    version: "1.0.0"
    kind: "table"
    description: "Cleaned order data"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/orders_cleaned.parquet"
    
    contract:
      schema:
        - name: "order_id"
          type: "INTEGER"
          required: true
        - name: "customer_id"
          type: "INTEGER"
          required: true
        - name: "order_date"
          type: "DATE"
        - name: "product_category"
          type: "VARCHAR"
        - name: "amount"
          type: "DECIMAL"
  
  - exposeId: "customer_order_summary"
    title: "Customer Order Summary"
    version: "1.0.0"
    kind: "table"
    description: "Customer order aggregations"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/customer_order_summary.parquet"
    
    contract:
      schema:
        - name: "customer_id"
          type: "INTEGER"
          required: true
        - name: "customer_name"
          type: "VARCHAR"
        - name: "country"
          type: "VARCHAR"
        - name: "total_orders"
          type: "INTEGER"
        - name: "total_revenue"
          type: "DECIMAL"
        - name: "avg_order_value"
          type: "DECIMAL"
      
      dq:
        rules:
          - id: "revenue_consistency"
            type: "consistency"
            description: "Ensure revenue calculations are consistent"
            severity: "error"
            logic: "SELECT COUNT(*) FROM customer_order_summary WHERE total_orders > 0 AND total_revenue = 0"
            threshold: 0
            operator: "="
  
  - exposeId: "sales_by_country"
    title: "Sales by Country"
    version: "1.0.0"
    kind: "table"
    description: "Revenue aggregated by country"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/sales_by_country.parquet"
    
    contract:
      schema:
        - name: "country"
          type: "VARCHAR"
          required: true
        - name: "total_customers"
          type: "INTEGER"
        - name: "total_orders"
          type: "INTEGER"
        - name: "total_revenue"
          type: "DECIMAL"

builds:
  - id: "sales_analytics_pipeline"
    description: "Multi-stage sales analytics with DAG orchestration"
    pattern: "multi-stage"
    engine: "sql"
    
    properties:
      stages:
        - id: "clean_customers"
          description: "Clean customer master data"
          executionPhase: "extract"
          logic: |
            SELECT
              customer_id,
              TRIM(name) AS name,
              LOWER(TRIM(email)) AS email,
              signup_date,
              UPPER(country) AS country
            FROM read_csv_auto('data/customers.csv', header=true)
            WHERE email IS NOT NULL
          outputs:
            - "customers_cleaned"
        
        - id: "clean_orders"
          description: "Clean order transaction data"
          executionPhase: "extract"
          logic: |
            SELECT
              order_id,
              customer_id,
              order_date,
              product_category,
              amount
            FROM read_csv_auto('data/orders.csv', header=true)
            WHERE amount > 0
          outputs:
            - "orders_cleaned"
        
        - id: "summarize_customer_orders"
          description: "Aggregate customer order metrics"
          executionPhase: "transform"
          dependsOn:
            - "clean_customers"
            - "clean_orders"
          logic: |
            SELECT
              c.customer_id,
              c.name AS customer_name,
              c.country,
              COUNT(o.order_id) AS total_orders,
              SUM(o.amount) AS total_revenue,
              AVG(o.amount) AS avg_order_value
            FROM customers_cleaned c
            LEFT JOIN orders_cleaned o
              ON c.customer_id = o.customer_id
            GROUP BY c.customer_id, c.name, c.country
          outputs:
            - "customer_order_summary"
        
        - id: "aggregate_sales_by_country"
          description: "Aggregate sales metrics by country"
          executionPhase: "aggregate"
          dependsOn:
            - "summarize_customer_orders"
          logic: |
            SELECT
              country,
              COUNT(DISTINCT customer_id) AS total_customers,
              SUM(total_orders) AS total_orders,
              SUM(total_revenue) AS total_revenue
            FROM customer_order_summary
            GROUP BY country
            ORDER BY total_revenue DESC
          outputs:
            - "sales_by_country"
        
        - id: "validate_customers"
          description: "Ensure no duplicate customer IDs"
          executionPhase: "validate"
          dependsOn:
            - "clean_customers"
          logic: |
            SELECT 
              CASE 
                WHEN COUNT(*) = 0 THEN 'PASS: No duplicate customers'
                ELSE 'FAIL: Found ' || COUNT(*) || ' duplicate customers'
              END AS validation_result
            FROM (
              SELECT customer_id, COUNT(*) as cnt
              FROM customers_cleaned
              GROUP BY customer_id
              HAVING COUNT(*) > 1
            ) duplicates
    
    execution:
      trigger:
        type: "scheduled"
        schedule: "0 2 * * *"
      runtime:
        platform: "local"
        resources:
          cpu: "2"
          memory: "4GB"
        timeout: "PT1H"
      monitoring:
        enabled: true
        sla: "PT1H"
        alerting:
          emailOnFailure: true
          emailOnRetry: false
          retries: 2
          retryDelay: "PT5M"

lifecycle:
  state: "active"
