description: |
  🌟 FLAGSHIP FEATURE: Auto-generate Airflow DAGs from FLUID contracts!
  
  This template showcases FLUID 0.7.1's killer feature: automatic DAG generation.
  Write your contract once, get a production-ready Airflow DAG automatically.
  
  You'll learn:
  - How FLUID converts contracts to Airflow DAGs
  - Zero Airflow code required - just define your contract
  - Automatic task dependency resolution
  - One command deployment to local Airflow
  - Pipeline monitoring and execution
  
  From contract to running DAG in under 15 minutes!
