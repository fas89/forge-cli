fluidVersion: "0.7.1"
kind: "DataProduct"
id: "quality.product_validation_v1"
name: "Product Quality Validation"
description: "Comprehensive data quality validation for product catalog"
domain: "Data Quality"
tags:
  - "data-quality"
  - "validation"
  - "products"

metadata:
  owner:
    team: "data-quality-team"
    email: "dq@company.com"

consumes:
  - consumeId: "raw_products"
    title: "Raw Product Catalog"
    version: "1.0.0"
    kind: "file"
    purpose: "Product catalog data for quality validation"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/products.csv"
    
    contract:
      schema:
        - name: "product_id"
          type: "INTEGER"
          required: true
        - name: "product_name"
          type: "VARCHAR"
        - name: "category"
          type: "VARCHAR"
        - name: "price"
          type: "DECIMAL"
        - name: "stock_quantity"
          type: "INTEGER"
        - name: "supplier_id"
          type: "INTEGER"
        - name: "last_updated"
          type: "DATE"

exposes:
  - exposeId: "validated_products"
    title: "Validated Products with Quality Scores"
    version: "1.0.0"
    kind: "table"
    description: "Product catalog with data quality scores"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/validated_products.parquet"
    
    contract:
      schema:
        - name: "product_id"
          type: "INTEGER"
          required: true
        - name: "product_name"
          type: "VARCHAR"
        - name: "category"
          type: "VARCHAR"
        - name: "price"
          type: "DECIMAL"
        - name: "stock_quantity"
          type: "INTEGER"
        - name: "supplier_id"
          type: "INTEGER"
        - name: "last_updated"
          type: "DATE"
        - name: "data_quality_score"
          type: "INTEGER"
          description: "Quality score 0-100"
      
      dq:
        rules:
          - id: "no_null_product_ids"
            type: "completeness"
            selector: "product_id"
            severity: "error"
            description: "Product ID is required for all products"
            threshold: 1.0
            operator: ">="
          - id: "unique_product_ids"
            type: "uniqueness"
            selector: "product_id"
            severity: "error"
            description: "Product IDs must be unique"
            threshold: 1.0
            operator: ">="
          - id: "valid_categories"
            type: "validity"
            selector: "category"
            severity: "error"
            description: "Categories must be valid"
            validValues: ["Electronics", "Furniture", "Stationery", "Office Supplies"]
          - id: "check_missing_names"
            type: "completeness"
            selector: "product_name"
            severity: "warning"
            description: "Products should have names"
            threshold: 0.95
            operator: ">="
          - id: "check_negative_prices"
            type: "accuracy"
            selector: "price"
            severity: "warning"
            description: "Prices must be positive"
            threshold: 0
            operator: ">="
  
  - exposeId: "data_quality_report"
    title: "Data Quality Summary Report"
    version: "1.0.0"
    kind: "view"
    description: "Summary of data quality metrics"
    
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/data_quality_report.parquet"
    
    contract:
      schema:
        - name: "total_records"
          type: "INTEGER"
        - name: "perfect_records"
          type: "INTEGER"
        - name: "good_quality_records"
          type: "INTEGER"
        - name: "poor_quality_records"
          type: "INTEGER"
        - name: "avg_quality_score"
          type: "DECIMAL"
        - name: "worst_quality_score"
          type: "INTEGER"
        - name: "missing_names"
          type: "INTEGER"
        - name: "invalid_prices"
          type: "INTEGER"
        - name: "negative_stock"
          type: "INTEGER"
        - name: "missing_dates"
          type: "INTEGER"

builds:
  - id: "product_quality_pipeline"
    description: "Validate product data and generate quality reports"
    pattern: "multi-stage"
    engine: "sql"
    
    properties:
      stages:
        - id: "calculate_quality_scores"
          description: "Calculate data quality score for each product"
          logic: |
            SELECT 
              product_id,
              product_name,
              category,
              price,
              stock_quantity,
              supplier_id,
              last_updated,
              CAST(
                (CASE WHEN product_name IS NOT NULL THEN 20 ELSE 0 END +
                 CASE WHEN price > 0 THEN 20 ELSE 0 END +
                 CASE WHEN stock_quantity >= 0 THEN 20 ELSE 0 END +
                 CASE WHEN supplier_id BETWEEN 100 AND 200 THEN 20 ELSE 0 END +
                 CASE WHEN last_updated IS NOT NULL THEN 20 ELSE 0 END)
              AS INTEGER) AS data_quality_score
            FROM read_csv_auto('data/products.csv', header=true)
          outputs:
            - "validated_products"
        
        - id: "generate_quality_report"
          description: "Generate summary quality report"
          dependsOn:
            - "calculate_quality_scores"
          logic: |
            SELECT 
              COUNT(*) AS total_records,
              SUM(CASE WHEN data_quality_score = 100 THEN 1 ELSE 0 END) AS perfect_records,
              SUM(CASE WHEN data_quality_score >= 80 THEN 1 ELSE 0 END) AS good_quality_records,
              SUM(CASE WHEN data_quality_score < 80 THEN 1 ELSE 0 END) AS poor_quality_records,
              ROUND(AVG(data_quality_score), 2) AS avg_quality_score,
              MIN(data_quality_score) AS worst_quality_score,
              SUM(CASE WHEN product_name IS NULL THEN 1 ELSE 0 END) AS missing_names,
              SUM(CASE WHEN price <= 0 THEN 1 ELSE 0 END) AS invalid_prices,
              SUM(CASE WHEN stock_quantity < 0 THEN 1 ELSE 0 END) AS negative_stock,
              SUM(CASE WHEN last_updated IS NULL THEN 1 ELSE 0 END) AS missing_dates
            FROM validated_products
          outputs:
            - "data_quality_report"
    
    execution:
      trigger:
        type: "manual"
      runtime:
        platform: "local"
  
  - name: check_negative_stock
    level: warning
    query: |
      SELECT COUNT(*) as invalid_count
      FROM {{ ref('raw_products') }}
      WHERE stock_quantity < 0
    expect:
      invalid_count: 0
    message: "Products with negative stock quantities detected"
  
  - name: check_supplier_range
    level: warning
    query: |
      SELECT COUNT(*) as invalid_count
      FROM {{ ref('raw_products') }}
      WHERE supplier_id < 100 OR supplier_id > 200
    expect:
      invalid_count: 0
    message: "Invalid supplier IDs (must be between 100-200)"
  
  - name: check_stale_data
    level: warning
    query: |
      SELECT COUNT(*) as stale_count
      FROM {{ ref('raw_products') }}
      WHERE last_updated < DATE('now', '-30 days')
        OR last_updated IS NULL
    expect:
      stale_count: 0
    message: "Products with outdated or missing update dates"
  
  # DATA PROFILING validations (INFO level) - Monitoring only
  - name: price_distribution_check
    level: info
    query: |
      SELECT 
        CASE 
          WHEN MAX(price) > (AVG(price) + 3 * STDDEV(price)) THEN 1
          ELSE 0
        END as has_outliers
      FROM {{ ref('raw_products') }}
      WHERE price > 0
    expect:
      has_outliers: 0
    message: "Price outliers detected (>3 standard deviations)"
  
  - name: minimum_record_count
    level: info
    query: |
      SELECT 
        CASE WHEN COUNT(*) >= 5 THEN 0 ELSE 1 END as insufficient_data
      FROM {{ ref('raw_products') }}
    expect:
      insufficient_data: 0
    message: "Minimum record count check (need at least 5 records)"

monitoring:
  data_quality_threshold: 80
  alert_on_quality_drop: true
  track_metrics:
    - avg_quality_score
    - poor_quality_records
    - total_validations_failed
