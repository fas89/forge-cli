fluidVersion: "0.7.1"
kind: "DataProduct"
id: "analytics.web_multi_layer_v1"
name: "Web Analytics - Medallion Architecture"
description: "Multi-layered analytics demonstrating Bronze/Silver/Gold pattern"
domain: "Web Analytics"
tags:
  - "medallion-architecture"
  - "bronze-silver-gold"
  - "multi-output"

metadata:
  owner:
    team: "analytics-platform"
    email: "analytics@company.com"
  layer: "Multi-Layer"

consumes:
  - consumeId: "raw_events"
    title: "Raw Web Events"
    version: "1.0.0"
    kind: "file"
    purpose: "Raw clickstream events from web application"
    
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "data/events.csv"
    
    contract:
      schema:
        - name: "event_id"
          type: "INTEGER"
          required: true
        - name: "user_id"
          type: "INTEGER"
        - name: "event_type"
          type: "VARCHAR"
        - name: "event_timestamp"
          type: "TIMESTAMP"
        - name: "device_type"
          type: "VARCHAR"
        - name: "page_url"
          type: "VARCHAR"
        - name: "session_id"
          type: "VARCHAR"

exposes:
  - exposeId: "bronze_events"
    title: "Bronze: Raw Events"
    version: "1.0.0"
    kind: "table"
    labels:
      layer: "bronze"
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/bronze_events.parquet"
    contract:
      schema:
        - { name: "event_id", type: "INTEGER" }
        - { name: "user_id", type: "INTEGER" }
        - { name: "event_type", type: "VARCHAR" }
        - { name: "event_timestamp", type: "TIMESTAMP" }
        - { name: "device_type", type: "VARCHAR" }
        - { name: "page_url", type: "VARCHAR" }
        - { name: "session_id", type: "VARCHAR" }
        - { name: "loaded_at", type: "TIMESTAMP" }
  
  - exposeId: "silver_events_cleaned"
    title: "Silver: Cleaned Events"
    version: "1.0.0"
    kind: "table"
    labels:
      layer: "silver"
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/silver_events_cleaned.parquet"
    contract:
      schema:
        - { name: "event_id", type: "INTEGER", required: true }
        - { name: "user_id", type: "INTEGER" }
        - { name: "event_type", type: "VARCHAR" }
        - { name: "event_timestamp", type: "TIMESTAMP" }
        - { name: "device_type", type: "VARCHAR" }
        - { name: "page_url", type: "VARCHAR" }
        - { name: "session_id", type: "VARCHAR" }
  
  - exposeId: "gold_daily_metrics"
    title: "Gold: Daily Metrics"
    version: "1.0.0"
    kind: "table"
    labels:
      layer: "gold"
    binding:
      platform: "local"
      format: "parquet"
      location:
        path: "output/gold_daily_metrics.parquet"
    contract:
      schema:
        - { name: "metric_date", type: "DATE", required: true }
        - { name: "total_events", type: "INTEGER" }
        - { name: "unique_users", type: "INTEGER" }
        - { name: "unique_sessions", type: "INTEGER" }
        - { name: "purchases", type: "INTEGER" }

builds:
  - id: "medallion_pipeline"
    description: "Multi-layer analytics following medallion architecture"
    pattern: "multi-stage"
    engine: "sql"
    properties:
      stages:
        - id: "bronze_ingest"
          logic: |
            SELECT *, CURRENT_TIMESTAMP as loaded_at
            FROM read_csv_auto('data/events.csv', header=true)
          outputs: ["bronze_events"]
        - id: "silver_clean"
          dependsOn: ["bronze_ingest"]
          logic: |
            SELECT event_id, user_id,
              LOWER(event_type) as event_type,
              event_timestamp,
              LOWER(device_type) as device_type,
              LOWER(TRIM(page_url)) as page_url,
              session_id
            FROM bronze_events
          outputs: ["silver_events_cleaned"]
        - id: "gold_daily"
          dependsOn: ["silver_clean"]
          logic: |
            SELECT 
              CAST(event_timestamp AS DATE) as metric_date,
              COUNT(*) as total_events,
              COUNT(DISTINCT user_id) as unique_users,
              COUNT(DISTINCT session_id) as unique_sessions,
              SUM(CASE WHEN event_type = 'purchase' THEN 1 ELSE 0 END) as purchases
            FROM silver_events_cleaned
            GROUP BY CAST(event_timestamp AS DATE)
          outputs: ["gold_daily_metrics"]
    execution:
      trigger:
        type: "manual"
      runtime:
        platform: "local"
