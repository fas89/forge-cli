# Build Profiles — runs on every push to main
#
# Mirrors the Jenkins multi-profile strategy:
#   - Alpha always builds
#   - Beta always builds
#   - Stable only builds if coverage >= 80% and all tests pass
#
# Artifacts (wheels) are uploaded to GitHub Actions for download.
# This does NOT publish to PyPI — use the release workflow for that.

name: Build Profiles

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_stable:
        description: "Force stable build even if coverage threshold not met"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Shared test + coverage run (used by profile gate decisions)
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.cov.outputs.percent }}
      tests_passed: ${{ steps.results.outputs.passed }}
      tests_failed: ${{ steps.results.outputs.failed }}
      tests_total: ${{ steps.results.outputs.total }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,local]" pytest-cov pytest-json-report || pip install -e ".[dev]" pytest-cov pytest-json-report

      - name: Run tests with coverage
        id: test-run
        run: |
          pytest tests/ \
            --cov=fluid_build \
            --cov-report=json:coverage.json \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --json-report --json-report-file=test-report.json \
            -q || echo "TEST_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Extract coverage
        id: cov
        run: |
          if [ -f coverage.json ]; then
            COV=$(python -c "import json; print(f'{json.load(open(\"coverage.json\"))[\"totals\"][\"percent_covered\"]:.1f}')")
          else
            COV="0"
          fi
          echo "percent=${COV}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COV}%"

      - name: Extract test results
        id: results
        run: |
          if [ -f test-report.json ]; then
            python -c "
          import json
          s = json.load(open('test-report.json')).get('summary', {})
          passed = s.get('passed', 0)
          failed = s.get('failed', 0)
          total = s.get('total', s.get('collected', 0))
          print(f'passed={passed}')
          print(f'failed={failed}')
          print(f'total={total}')
          " | tee -a "$GITHUB_OUTPUT"
          else
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: |
            coverage.json
            coverage.xml
            test-report.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Alpha build — always runs
  # ──────────────────────────────────────────────────────────────
  build-alpha:
    name: Build Alpha
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build alpha wheel
        run: |
          pip install --upgrade pip build
          FLUID_BUILD_PROFILE=alpha python -m build
          echo "=== Built packages ==="
          ls -lh dist/

      - name: Upload alpha wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheel-alpha
          path: dist/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Beta build — always runs
  # ──────────────────────────────────────────────────────────────
  build-beta:
    name: Build Beta
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build beta wheel
        run: |
          pip install --upgrade pip build
          FLUID_BUILD_PROFILE=beta python -m build
          echo "=== Built packages ==="
          ls -lh dist/

      - name: Upload beta wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheel-beta
          path: dist/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Stable build — only when coverage >= 80% and tests pass
  # ──────────────────────────────────────────────────────────────
  build-stable:
    name: Build Stable
    needs: test
    if: |
      (needs.test.outputs.tests_failed == '0' &&
       fromJSON(needs.test.outputs.coverage) >= 80) ||
      github.event.inputs.force_stable == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build stable wheel
        run: |
          pip install --upgrade pip build twine
          FLUID_BUILD_PROFILE=stable python -m build
          twine check dist/*
          echo "=== Built packages ==="
          ls -lh dist/

      - name: Smoke-test stable wheel
        run: |
          python -m venv /tmp/test-install
          /tmp/test-install/bin/pip install dist/*.whl
          /tmp/test-install/bin/python -c "import fluid_build; print(f'Version: {fluid_build.__version__}')"
          /tmp/test-install/bin/python -c "import fluid_build; print(f'Providers: {list(fluid_build.get_enabled_providers())}')"

      - name: Upload stable wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheel-stable
          path: dist/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Summary — report what was built
  # ──────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    needs: [test, build-alpha, build-beta]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "## Build Profiles Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests Passed | ${{ needs.test.outputs.tests_passed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests Failed | ${{ needs.test.outputs.tests_failed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${{ needs.test.outputs.coverage }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Profile | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Alpha | ${{ needs.build-alpha.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Beta | ${{ needs.build-beta.result }} |" >> "$GITHUB_STEP_SUMMARY"

          COVERAGE=${{ needs.test.outputs.coverage }}
          FAILED=${{ needs.test.outputs.tests_failed }}
          if [ "$FAILED" = "0" ] && python3 -c "import sys; sys.exit(0 if float('$COVERAGE') >= 80 else 1)" 2>/dev/null; then
            echo "| Stable | Built (gate passed) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Stable | Skipped (coverage ${COVERAGE}%, ${FAILED} failures) |" >> "$GITHUB_STEP_SUMMARY"
          fi
