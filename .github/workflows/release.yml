# Release Pipeline — publish to PyPI, GHCR, and GitHub Releases
#
# Triggers:
#   - Push a tag matching v*.*.* (e.g. v0.7.1, v0.7.1a1, v0.7.1b2)
#   - Manual dispatch with version input
#
# Pre-release tags (containing 'a' or 'b') go to TestPyPI.
# Stable tags go to PyPI.
# Docker images always go to GHCR.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.7.1, v0.7.1a1)"
        required: true
        type: string

permissions:
  contents: write      # GitHub Releases
  id-token: write      # PyPI Trusted Publisher (OIDC)
  packages: write      # GHCR Docker push
  attestations: write  # Artifact attestations

env:
  PACKAGE_NAME: fluid-forge
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Quality gate — must pass before any publishing
  # ──────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      profile: ${{ steps.meta.outputs.profile }}
    steps:
      - uses: actions/checkout@v5

      - name: Parse version metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip leading 'v'
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *a* ]] || [[ "$VERSION" == *dev* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "profile=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *b* ]] || [[ "$VERSION" == *rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "profile=beta" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "profile=stable" >> "$GITHUB_OUTPUT"
          fi

          echo "Tag: ${TAG}"
          echo "Version: ${VERSION}"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,local]" || pip install -e ".[dev]"

      - name: Lint
        run: |
          pip install "black==24.10.0"
          ruff check fluid_build/ tests/
          black --check fluid_build/ tests/

      - name: Tests with coverage
        run: |
          pip install pytest-cov
          pytest --cov=fluid_build --cov-report=xml --cov-report=term-missing -q

      - name: Security scan
        run: |
          pip install bandit
          bandit -r fluid_build/ -c pyproject.toml --severity-level medium -q

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${{ steps.meta.outputs.version }}"
          # For pre-release, strip suffix for comparison (0.7.1a1 base is 0.7.1)
          TAG_BASE=$(echo "$TAG_VERSION" | sed 's/[ab].*//' | sed 's/\.dev.*//' | sed 's/rc.*//')
          if [ "$PKG_VERSION" != "$TAG_BASE" ] && [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=${PKG_VERSION}, tag=${TAG_VERSION} (base=${TAG_BASE})"
            exit 1
          fi
          echo "Version verified: ${TAG_VERSION} (base matches ${PKG_VERSION})"

  # ──────────────────────────────────────────────────────────────
  # 2. Build distribution artifacts
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build Package
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          pip install --upgrade pip build twine

      - name: Build wheel and sdist
        env:
          FLUID_BUILD_PROFILE: ${{ needs.quality-gate.outputs.profile }}
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/test-install
          /tmp/test-install/bin/pip install dist/*.whl
          /tmp/test-install/bin/python -c "import fluid_build; print(f'Version: {fluid_build.__version__}')"
          /tmp/test-install/bin/python -c "import fluid_build; print(f'Providers: {list(fluid_build.get_enabled_providers())}')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # 3a. Publish to TestPyPI (pre-release tags only)
  # ──────────────────────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [quality-gate, build]
    if: needs.quality-gate.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/fluid-forge
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ──────────────────────────────────────────────────────────────
  # 3b. Publish to PyPI (stable tags only)
  # ──────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [quality-gate, build]
    if: needs.quality-gate.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/fluid-forge
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────────────────────
  # 4. GitHub Release with changelog and artifacts
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [quality-gate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${{ needs.quality-gate.outputs.version }}"
          PROFILE="${{ needs.quality-gate.outputs.profile }}"
          IS_PRE="${{ needs.quality-gate.outputs.is_prerelease }}"

          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > release-notes.md << 'HEADER'
          ## Installation

          ```bash
          pip install fluid-forge
          ```

          Or with extras:
          ```bash
          pip install "fluid-forge[local]"       # DuckDB local provider
          pip install "fluid-forge[gcp]"         # Google Cloud provider
          pip install "fluid-forge[snowflake]"   # Snowflake provider
          pip install "fluid-forge[all]"         # Everything
          ```

          HEADER

          if [ "$IS_PRE" = "true" ]; then
            cat >> release-notes.md << EOF

          > **Pre-release** ($PROFILE) — not recommended for production use.
          >
          > Install from TestPyPI:
          > \`\`\`bash
          > pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ fluid-forge==${VERSION}
          > \`\`\`

          EOF
          fi

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "FLUID Build ${{ needs.quality-gate.outputs.version }}"
          body_path: release-notes.md
          prerelease: ${{ needs.quality-gate.outputs.is_prerelease == 'true' }}
          files: dist/*

  # ──────────────────────────────────────────────────────────────
  # 5. Build and push Docker image to GHCR
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Image (GHCR)
    needs: [quality-gate, build]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5

      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.quality-gate.outputs.profile }}-latest
            type=raw,value=latest,enable=${{ needs.quality-gate.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            PROFILE=${{ needs.quality-gate.outputs.profile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
