name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff "black==24.10.0"
      - name: Ruff check
        run: ruff check fluid_build/ tests/
      - name: Black check
        run: black --check fluid_build/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,local]" || pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --cov=fluid_build --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -q
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build-check:
    name: Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: |
          pip install --upgrade pip build
          python -m build
      - name: Verify wheel installs
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import fluid_build; print(fluid_build.__version__)"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Bandit security scan
        run: bandit -r fluid_build/ -c pyproject.toml --severity-level medium -q

  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check license headers
        run: |
          missing=$(grep -rL "Copyright 2024-2026" fluid_build/ tests/ --include="*.py" || true)
          if [ -n "$missing" ]; then
            echo "::error::Files missing license headers:"
            echo "$missing"
            echo ""
            echo "Run: python scripts/add_license_headers.py"
            exit 1
          fi
          echo "All Python files have license headers ✅"
