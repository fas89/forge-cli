fluidVersion: "0.7.1"
kind: DataProduct
id: analytics.data_lake.sales_etl
name: Sales ETL Job
description: Spark ETL job that reads raw CSV, transforms, and writes to the curated Iceberg table
domain: Analytics

tags:
  - data-lake
  - aws-glue
  - etl
  - spark

labels:
  team: data-engineering
  platform: aws

metadata:
  layer: Transform
  owner:
    team: data-engineering
    email: data-eng@company.com

# ─── Build: Glue Spark ETL Job ──────────────────────────────

build:
  engine: glue
  properties:
    job_name: sales-csv-to-iceberg
    role: "{{ env.GLUE_ETL_ROLE }}"
    script_location: "s3://{{ env.DATA_LAKE_BUCKET }}/scripts/sales_etl.py"
    command_name: glueetl
    glue_version: "4.0"
    worker_type: G.1X
    number_of_workers: 5
    timeout: 120
    max_retries: 1
    description: "Transform raw sales CSV → curated Iceberg table"
    default_arguments:
      "--enable-glue-datacatalog": "true"
      "--TempDir": "s3://{{ env.DATA_LAKE_BUCKET }}/glue-temp/"
      "--job-bookmark-option": "job-bookmark-enable"
      "--SOURCE_DATABASE": "sales_db"
      "--SOURCE_TABLE": "raw_sales"
      "--TARGET_DATABASE": "sales_db"
      "--TARGET_TABLE": "curated_sales"
    extra_py_files: []
    extra_jars: []
    connections: []

# ─── Orchestration ───────────────────────────────────────────

orchestration:
  schedule: daily
  timezone: UTC
  engine: airflow
  tasks:
    - taskId: ensure_database
      type: provider_action
      action: aws.glue.ensure_database
      params:
        database: sales_db

    - taskId: run_crawler
      type: provider_action
      action: aws.glue.run_crawler
      params:
        crawler_name: sales-raw-crawler
      dependsOn: [ensure_database]

    - taskId: run_etl
      type: provider_action
      action: aws.glue.ensure_job
      params:
        name: sales-csv-to-iceberg
        role: "{{ env.GLUE_ETL_ROLE }}"
        script_location: "s3://{{ env.DATA_LAKE_BUCKET }}/scripts/sales_etl.py"
      dependsOn: [run_crawler]

    - taskId: verify_output
      type: provider_action
      action: aws.athena.execute_query
      params:
        query: "SELECT COUNT(*) AS row_count FROM sales_db.curated_sales WHERE order_date = current_date"
        database: sales_db
      dependsOn: [run_etl]
